<!DOCTYPE html>
<html>
<head><title>Short</title></head>
<body style="text-align:center;margin-top:20vh">
<div id="app">
<input v-model="url" autofocus style="width:50%">
<button @click="shorten">Shorten!</button>
<p>{{ message }}</p>
</div>
<script src="https://unpkg.com/vue"></script>
<script>new Vue({el:'#app',data:{url:'',message:''},methods:{shorten(){this.$http.post('/shorten/',{url:this.url}).then(r=>this.message=r.body,e=>console.log(e))}}})</script>
</body>
</html>
